<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research Report – Lloyd Sato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e11;
      --bg-card: #1c1c22;
      --text: #e2e0dc;
      --text-muted: #8a8690;
      --accent: #c4713b;
      --accent-light: #e09060;
      --accent-dim: rgba(196, 113, 59, 0.15);
      --border: #2a2a32;
      --border-hover: #3a3a44;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── STATUS BAR (matches "available for opportunities" pill on main site) ── */
    .status-bar {
      position: fixed;
      top: 0; left: 0; right: 0; height: 28px;
      z-index: 101;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 28px; left: 0; right: 0; height: 52px;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(14,14,17,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }

    /* Bracketed brand — matches [lloyd.sato] on the main site */
    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .brand:hover { color: var(--accent); }
    .brand .bracket { color: var(--text-muted); font-weight: 400; }

    .brand-sep {
      width: 1px; height: 18px; background: var(--border); flex-shrink: 0;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); text-decoration: none;
      font-size: 0.8rem; padding: 5px 10px;
      border-radius: 6px; border: 1px solid var(--border);
      transition: all 0.2s; white-space: nowrap;
    }
    .back-link:hover { color: var(--text); border-color: var(--border-hover); background: var(--bg-card); }
    .back-link svg { width: 13px; height: 13px; flex-shrink: 0; }

    .report-title {
      display: flex; align-items: center; gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--text-muted);
      letter-spacing: 0.5px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 320px;
    }
    .report-title .section-num {
      color: var(--accent);
      font-weight: 600;
    }
    .report-title .section-line {
      width: 20px; height: 1px; background: var(--border-hover); flex-shrink: 0;
    }
    .report-title .path { color: var(--accent); }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 6px; }

    .tool-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      flex-shrink: 0;
    }
    .tool-btn:hover { color: var(--text); background: var(--bg-card); border-color: var(--border-hover); }
    .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .tool-btn svg { width: 14px; height: 14px; }

    .page-jump {
      display: flex; align-items: center; gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; color: var(--text-muted);
      white-space: nowrap;
    }

    .page-jump input {
      width: 40px; height: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .page-jump input::-webkit-outer-spin-button,
    .page-jump input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .page-jump input:focus { border-color: var(--accent); }

    .divider-v { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

    .zoom-select {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; padding: 5px 8px; border-radius: 6px;
      cursor: pointer; outline: none; transition: all 0.2s;
    }
    .zoom-select:hover { border-color: var(--border-hover); color: var(--text); }

    .download-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--accent-dim); background: var(--accent-dim);
      color: var(--accent-light); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all 0.2s;
      white-space: nowrap;
    }
    .download-btn:hover { background: rgba(196,113,59,0.25); border-color: var(--accent); }
    .download-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── VIEWER ── */
    #viewer-wrap {
      position: fixed;
      top: 80px; left: 0; right: 0; bottom: 32px;
      overflow-y: scroll;
      overflow-x: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      gap: 12px;
    }

    #viewer-wrap::-webkit-scrollbar { width: 6px; }
    #viewer-wrap::-webkit-scrollbar-track { background: transparent; }
    #viewer-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #viewer-wrap::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .pdf-page {
      display: block;
      box-shadow: 0 2px 24px rgba(0,0,0,0.55);
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      top: 80px; left: 0; right: 0; bottom: 32px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; background: var(--bg); z-index: 50;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--text-muted); letter-spacing: 1px;
    }
    .loading-text .prompt { color: var(--accent); margin-right: 6px; }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      z-index: 99;
    }
    footer .sep { color: var(--border-hover); margin: 0 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .report-title .section-line { display: none; }
      .report-title { max-width: 180px; }
    }
    @media (max-width: 640px) {
      .brand-sep   { display: none; }
      .brand       { display: none; }
      .report-title { display: none; }
      .zoom-select  { display: none; }
      .divider-v    { display: none; }
      .download-btn span { display: none; }
      .download-btn { padding: 6px 10px; }
    }
  </style>
</head>
<body>

  <!-- Status bar matching the "available for opportunities" pill on lloydsato.com -->
  <div class="status-bar">
    <span class="status-dot" aria-hidden="true"></span>
    <span>available for opportunities</span>
  </div>

  <header>
    <div class="header-left">
      <a href="https://www.lloydsato.com" class="brand">
        <span class="bracket">[</span>lloyd.sato<span class="bracket">]</span>
      </a>
      <span class="brand-sep" aria-hidden="true"></span>
      <a href="https://www.lloydsato.com" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
      <div class="report-title">
        <span class="section-num">03</span>
        <span class="section-line" aria-hidden="true"></span>
        <span><span class="path">research/</span> Decoding Malicious Camouflage</span>
      </div>
    </div>

    <div class="toolbar">
      <button class="tool-btn" id="prev-btn" title="Previous page" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="page-jump">
        <input type="number" id="page-input" min="1" value="1" title="Jump to page"/>
        <span>/ <span id="total-pages">—</span></span>
      </div>

      <button class="tool-btn" id="next-btn" title="Next page" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <div class="divider-v"></div>

      <select class="zoom-select" id="zoom-select">
        <option value="0.5">50%</option>
        <option value="0.75">75%</option>
        <option value="1" selected>100%</option>
        <option value="1.25">125%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
      </select>

      <div class="divider-v"></div>

      <a href="report.pdf" download class="download-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download</span>
      </a>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">
      <span class="prompt">lloyd@soc ~ %</span>loading report...
    </div>
  </div>

  <div id="viewer-wrap"></div>

  <footer>
    <span>Built by Lloyd Sato</span>
    <span class="sep">·</span>
    <span>2026</span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const wrap       = document.getElementById('viewer-wrap');
    const loading    = document.getElementById('loading');
    const pageInput  = document.getElementById('page-input');
    const totalEl    = document.getElementById('total-pages');
    const prevBtn    = document.getElementById('prev-btn');
    const nextBtn    = document.getElementById('next-btn');
    const zoomSelect = document.getElementById('zoom-select');

    let pdfDoc = null;
    let scale  = 1;
    const DPR  = window.devicePixelRatio || 1;

    function maxWidth() {
      return Math.min(window.innerWidth - 32, 960);
    }

    async function renderPage(num) {
      const page     = await pdfDoc.getPage(num);
      const baseVP   = page.getViewport({ scale: 1 });
      const fitScale = (maxWidth() / baseVP.width) * scale;
      const vp       = page.getViewport({ scale: fitScale });

      const canvas         = document.createElement('canvas');
      canvas.className     = 'pdf-page';
      canvas.id            = 'p' + num;
      canvas.width         = Math.round(vp.width  * DPR);
      canvas.height        = Math.round(vp.height * DPR);
      canvas.style.width   = Math.round(vp.width)  + 'px';
      canvas.style.height  = Math.round(vp.height) + 'px';

      wrap.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);

      await page.render({ canvasContext: ctx, viewport: vp, intent: 'display' }).promise;
    }

    async function renderAll() {
      wrap.innerHTML = '';
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        await renderPage(i);
      }
    }

    function jumpToPage(num) {
      const el = document.getElementById('p' + num);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function getVisiblePage() {
      const canvases = wrap.querySelectorAll('.pdf-page');
      let best = 1, bestVis = 0;
      const wrapRect = wrap.getBoundingClientRect();
      canvases.forEach((c, i) => {
        const r   = c.getBoundingClientRect();
        const top = Math.max(r.top,    wrapRect.top);
        const bot = Math.min(r.bottom, wrapRect.bottom);
        const vis = Math.max(0, bot - top);
        if (vis > bestVis) { bestVis = vis; best = i + 1; }
      });
      return best;
    }

    wrap.addEventListener('scroll', () => {
      const cur = getVisiblePage();
      pageInput.value  = cur;
      prevBtn.disabled = cur <= 1;
      nextBtn.disabled = cur >= (pdfDoc ? pdfDoc.numPages : 1);
    }, { passive: true });

    prevBtn.addEventListener('click', () => {
      const cur = getVisiblePage();
      if (cur > 1) jumpToPage(cur - 1);
    });
    nextBtn.addEventListener('click', () => {
      const cur = getVisiblePage();
      if (pdfDoc && cur < pdfDoc.numPages) jumpToPage(cur + 1);
    });

    pageInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = parseInt(pageInput.value);
        if (pdfDoc && val >= 1 && val <= pdfDoc.numPages) {
          jumpToPage(val);
          pageInput.blur();
        }
      }
    });
    pageInput.addEventListener('blur', () => {
      const val = parseInt(pageInput.value);
      if (pdfDoc && val >= 1 && val <= pdfDoc.numPages) jumpToPage(val);
    });

    zoomSelect.addEventListener('change', () => {
      scale = parseFloat(zoomSelect.value);
      renderAll();
    });

    document.addEventListener('keydown', e => {
      if (document.activeElement === pageInput) return;
      if (e.key === 'ArrowDown'  || e.key === 'ArrowRight') nextBtn.click();
      if (e.key === 'ArrowUp'    || e.key === 'ArrowLeft')  prevBtn.click();
    });

    pdfjsLib.getDocument('report.pdf').promise.then(async pdf => {
      pdfDoc = pdf;
      totalEl.textContent  = pdf.numPages;
      pageInput.max        = pdf.numPages;
      loading.style.display = 'none';
      prevBtn.disabled = true;
      nextBtn.disabled = false;
      await renderAll();
    }).catch(err => {
      loading.innerHTML = `
        <div style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;
                    color:#c4713b;text-align:center;padding:20px;line-height:1.8;">
          <span style="color:#c4713b;">lloyd@soc ~ %</span> cat report.pdf<br>
          <span style="color:#e09060;">Could not load report.pdf</span><br>
          <span style="color:#8a8690;font-size:0.7rem;">
            Make sure report.pdf is in the same folder as this file.
          </span>
        </div>`;
      console.error(err);
    });
  </script>
</body>
</html>
